<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. G AI Consultant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #020617;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        /* Deep, blurred background gradient */
        .bg-blur {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            background: url('./bg.png') center / cover no-repeat;
            filter: blur(40px) brightness(0.7);
            z-index: 0;
            pointer-events: none;
        }

        /* Sharp, contained foreground image */
        .bg-sharp {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: url('./bg.png') center / contain no-repeat;
            z-index: 1;
            pointer-events: none;
        }
        
        /* Restored container to ensure full width for the widget script to inject relative to */
        .widget-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Inner wrapper that does the clipping */
        .widget-clipper {
            overflow: hidden;
            display: inline-block;
            border-radius: 40px; /* Soft round edges to match the pill */
        }

        /* Negative margin hides the bottom text */
        elevenlabs-convai {
            display: block;
            margin-bottom: -25px; 
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="bg-sharp"></div>
    
    <div class="widget-container">
        <div class="widget-clipper">
            <elevenlabs-convai agent-id="nV1qVKfHBpuKWzA3EhVG"></elevenlabs-convai>
        </div>
    </div>
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
