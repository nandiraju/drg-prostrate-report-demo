<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. G AI Consultant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #303030 0%, #000000 100%); /* Radial grey to black gradient */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }
        
 

        /* Negative margin hides the bottom text */
        elevenlabs-convai {
            display: block;
            margin-bottom: -25px; 
        }

        /* Hero Image styling */
        .hero-img {
            max-width: calc(100% - 40px); /* Accounts for left and right margins */
            height: auto;
            object-fit: contain;
            z-index: 1; /* Keeps hero image above the animated background */
            margin: 0 20px; /* 20px margin horizontal */
            border-radius: 30px;
            opacity: 0.9;
        }
        
        /* Animated Logo Background Wrapper */
        .logo-bg-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vmax; /* Uses vmax to ensure it covers the screen even on tall devices */
            height: 150vmax;
            transform: translate(-50%, -50%);
            opacity: 0.6; /* Increased opacity to become visible */
            z-index: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 60s linear infinite;
        }

        .logo-bg-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <!-- Animated Logo Background -->
    <div class="logo-bg-wrapper">
        <img src="./logo.svg" alt="" >
    </div>

    <img src="./bg.png" alt="Background" class="hero-img">    
        <elevenlabs-convai agent-id="nV1qVKfHBpuKWzA3EhVG"></elevenlabs-convai>
    
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
