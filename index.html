<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dr. G AI Consultant</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0f0f 0%, #303030 100%); /* Black and grey gradient */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }
        
        /* Inner wrapper that does the clipping and positioning */
        .widget-clipper {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            overflow: hidden;
            display: inline-block;
            border-radius: 40px; /* Soft round edges to match the pill */
        }

        /* Negative margin hides the bottom text */
        elevenlabs-convai {
            display: block;
            margin-bottom: -25px; 
        }

        /* Hero Image styling */
        .hero-img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <img src="./bg.png" alt="Background" class="hero-img">

    <div class="widget-clipper">
        <elevenlabs-convai agent-id="nV1qVKfHBpuKWzA3EhVG"></elevenlabs-convai>
    </div>
    <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
